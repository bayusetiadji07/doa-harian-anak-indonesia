  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Doa Harian">
  
  <title>Doa Harian Anak Indonesia</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Amiri+Quran&display=swap" rel="stylesheet">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  
  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Splash Screen */
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at 30% 20%, #10B981 0%, #065F46 55%, #022C22 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
      overflow: hidden;
    }
    .splash-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(212,165,116,0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(212,165,116,0.12) 0%, transparent 40%);
      pointer-events: none;
    }
    
    .splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .splash-characters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      animation: gentleFloat 3s ease-in-out infinite;
    }
    .splash-characters img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,0.35));
    }
    
    .splash-title {
      color: #FEF3C7;
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 800;
      font-style: italic;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    
    .splash-subtitle {
      color: rgba(254,243,199,0.75);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    
    .splash-loader {
      margin-top: 2.5rem;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(212,165,116,0.3);
      border-top-color: #D4A574;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div class="splash-screen" id="splashScreen">
    <div class="splash-characters">
      <img src="assets/characters/boy.webp" alt="">
      <img src="assets/characters/girl.webp" alt="">
    </div>
    <h1 class="splash-title">Doa Harian</h1>
    <p class="splash-subtitle">Anak Indonesia</p>
    <div class="splash-loader"></div>
  </div>

      <div class="header-logo">

      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="navigateTo('progress')" title="Progress" aria-label="Progress">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-6"/></svg>
        </button>
        <button class="icon-btn" onclick="navigateTo('settings')" title="Pengaturan" aria-label="Pengaturan">

        </button>

      <span class="nav-label">Doa</span>

      <span class="nav-label">Progress</span>
    </div>
  </nav>
